<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
font-family:Arial;
background:#f2f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
width:300px;
}

input,select,button{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#3498db;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

#melding{
color:red;
text-align:center;
}

</style>
</head>

<body>

<div class="card">

<h2>Login</h2>

<label>School</label>

<select id="school">
<option value="">-- Kies school --</option>
<option value="gbzDeBosrank">Gbz De Bosrank</option>
<option value="kouter">Gbs De Kouter</option>
</select>

<label>Gebruikersnaam</label>
<input type="text" id="username" placeholder="Bijv. admin">

<label>Wachtwoord</label>
<input type="password" id="password" placeholder="Wachtwoord">

<button onclick="login()">Inloggen</button>

<div id="melding"></div>

</div>

<script>

// USERS LADEN
let users = JSON.parse(localStorage.getItem("users")) || [];

// ALS GEEN USERS BESTAAN -> VOORBEELD USERS MAKEN
if(users.length === 0){

users = [

{username:"admin",password:"admin123",role:"admin",school:"gbzDeBosrank"},
{username:"leerkracht1",password:"les123",role:"leerkracht",school:"bosrank"},
{username:"admin2",password:"admin123",role:"admin",school:"kouter"},
{username:"leerkracht2",password:"les456",role:"leerkracht",school:"kouter"}

];

localStorage.setItem("users",JSON.stringify(users));

}

// LOGIN FUNCTIE
function login(){

const school=document.getElementById("school").value;
const username=document.getElementById("username").value.trim();
const password=document.getElementById("password").value.trim();
const melding=document.getElementById("melding");

if(!school || !username || !password){

melding.textContent="Vul alle velden in!";
return;

}

// GEBRUIKER ZOEKEN
const user=users.find(u =>
u.username===username &&
u.password===password &&
u.school===school
);

if(!user){

melding.textContent="Onjuiste login of verkeerde school!";
return;

}

// LOGIN OPSLAAN
localStorage.setItem("school",school);
localStorage.setItem("role",user.role);
localStorage.setItem("username",username);

// DOORSTUREN
window.location="index.html";

}

</script>

</body>
</html>
